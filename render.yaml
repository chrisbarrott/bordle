services:
  - type: web
    name: bordle
    env: python
    pythonVersion: 3.13
    buildCommand: pip install --default-timeout=120 --retries 5 --prefer-binary -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: PIP_DEFAULT_TIMEOUT
        value: "120"
    buildTimeout: 3600
    preDeployCommand: |
      echo "Build complete"