<!-- game_over_modal.html -->
<div id="gameOverModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl p-6 relative">
    <h2 class="text-2xl font-bold text-red-600 text-center mb-4">Out of guesses!</h2>
    <p class="text-center text-lg mb-2">The bordering countries of <strong>{{ country_name }}</strong> were:</p>
    <div class="text-center text-gray-700 mb-4">
      {{ all_correct | join(", ") }}
    </div>
    <div id="finalMap" class="w-full h-80 mb-4"></div>
    <p class="text-center text-gray-600">Try again tomorrow!</p>
  </div>
</div>

<script>
  const finalSpec = {
    "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
    "width": "container",
    "height": 300,
    "projection": { "type": "equalEarth" },
    "layer": [
      {
        "data": {
          "values": {{ country_geojson | tojson }}
        },
        "mark": { "type": "geoshape", "fill": "black", "stroke": "white" }
      },
      {% for shape in final_shapes %}
      {
        "data": {
          "values": {{ shape | tojson }}
        },
        "mark": { "type": "geoshape", "fill": "green", "stroke": "white" }
      }{% if not loop.last %},{% endif %}
      {% endfor %}
    ]
  };
  vegaEmbed('#finalMap', finalSpec, { actions: false });
</script>
