<!-- Tom Select CSS -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

<form method="POST" action="{{ url_for('submit') }}" class="w-full max-w-lg mx-auto mt-4 space-y-4">

  <!-- Country dropdown -->
  <div>
    <label for="country_guess" class="block text-sm font-medium text-gray-700 mb-1">Guess a bordering country:</label>
    <select id="country_guess" name="country_guess" placeholder="Select your country">
      <option value="" disabled selected>Select your country</option>
      {% for country in border_options %}
        {% if country not in sea_options %}
          <option value="{{ country }}">{{ country }}</option>
        {% endif %}
      {% endfor %}
    </select>
  </div>

  <!-- Sea dropdown -->
  <div>
    <label for="sea_guess" class="block text-sm font-medium text-gray-700 mb-1">Guess a bordering sea:</label>
    <select id="sea_guess" name="sea_guess" placeholder="Select your sea">
      <option value="" disabled selected>Select your sea</option>
      {% for sea in sea_options %}
        <option value="{{ sea }}">{{ sea }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="text-center">
    <button type="submit"
      class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 w-full text-lg">
      Submit Guess
    </button>
  </div>
</form>

<!-- Tom Select JS -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
  new TomSelect("#country_guess", {
    create: false,
    sortField: {
      field: "text",
      direction: "asc"
    },
    placeholder: "Select your country"
  });

  new TomSelect("#sea_guess", {
    create: false,
    sortField: {
      field: "text",
      direction: "asc"
    },
    placeholder: "Select your sea"
  });
</script>
