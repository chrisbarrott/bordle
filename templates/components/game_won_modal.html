<!-- components/game_won_modal.html -->
<div id="gameWonMessage" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl p-6 relative">

    <h2 class="text-2xl font-bold text-green-600 text-center mb-4">Well done!</h2>
    <p class="text-center text-lg mb-2">
      You correctly guessed all of <strong>{{ country_name }}</strong>'s bordering countries:
    </p>

    <div class="text-center text-gray-700 mb-4">
      <strong>{{ all_correct | join(", ") }}</strong>
    </div>

    <div id="victoryMap" class="w-full h-80 mb-4 bg-gray-200"></div>

    <p class="text-center text-gray-600">Come back tomorrow for a new challenge!</p>

    <!-- Share Results Button -->
    <div class="mt-4 flex flex-col items-center space-y-2 sm:flex-row sm:justify-center sm:space-y-0 sm:space-x-2">  
      <!-- 📊 Show Stats Button -->
      <button
        onclick="window.location.href='/stats'"
        class="flex-1 sm:flex-none bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
      >
        🌍 View World Stats
      </button>

      <!-- 📈 Your Current Stats Box -->
      <div id="statsContainer" class="flex-1 sm:flex-none border border-blue-300 rounded-lg p-3 bg-blue-50 shadow text-sm">
        <h3 class="font-semibold text-blue-800 mb-1 text-center">Your Stats</h3>
        <table class="w-full text-center text-gray-800 border-collapse">
          <thead>
            <tr class="border-b border-gray-300 text-xs text-gray-600">
              <th>Played</th>
              <th>Wins</th>
              <th>Streak</th>
              <th>Rate%</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td id="game_played">0</td>
              <td id="game_won">0</td>
              <td id="local_current_streak">0</td>
              <td id="local_success_rate">0%</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- WhatsApp Share -->
      <button
        id="whatsappShare"
        onclick="shareToWhatsapp()"
        type="button"
        class="w-11/12 sm:w-auto inline-flex items-center justify-center bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
      >
        <img src="/static/images/whatsapp_icon.png" alt="Share on WhatsApp" class="h-5 w-5 mr-2">
        Share Result
      </button>

      <!-- Copy to Clipboard -->
      <button
        onclick="copyToClipboard()"
        type="button"
        class="w-11/12 sm:w-auto inline-flex items-center justify-center bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700"
      >
        📋 Copy to Clipboard
      </button>
    </div>


  </div>
</div>

<!-- Leaflet CSS & JS -->
<script src="{{ url_for('static', filename='js/game_stats_local.js') }}"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div id="victoryMap" class="w-full h-96 mb-4 rounded border"></div>

<script type="text/javascript">
  window.onload = function () {
    const map = L.map('victoryMap');

    L.tileLayer('https://api.maptiler.com/maps/basic-v2/256/{z}/{x}/{y}.png?key=shOVlsPI8fhJlEek08rF', {
      attribution: '&copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a> contributors',
      tileSize: 256,
      zoomOffset: 0,
      zoom: 1.5
    }).addTo(map);

    // Load data
    const mainCountry = {{ country_geojson | tojson }};
    const correctShapes = {{ correct_shapes | tojson }};
    const wrongShapes = {{ wrong_shapes | tojson }};

    // Style functions
    const mainStyle = { color: "black", weight: 2, fillOpacity: 0.7 };
    const correctStyle = { color: "green", weight: 1, fillOpacity: 0.5 };
    const wrongStyle = { color: "red", weight: 1, fillOpacity: 0.5 };

    // Add and zoom to main country
    const mainLayer = L.geoJSON(mainCountry, { style: mainStyle }).addTo(map);
    map.fitBounds(mainLayer.getBounds());
    map.setZoom(map.getZoom() - 1);  // Zoom out slightly

    // Add correct and wrong shapes
    correctShapes.forEach(shape => {
      L.geoJSON(shape, { style: correctStyle }).addTo(map);
    });

    wrongShapes.forEach(shape => {
      L.geoJSON(shape, { style: wrongStyle }).addTo(map);
    });


  };
</script>

<script>
  // Function to get the flag
  function countryToFlagEmoji(country) {
    const isoUrl = "{{ url_for('static', filename='map_data/iso_country_codes.json') }}";
    const isoMap = {{ iso_map | tojson }};
    const code = isoMap[country.trim()];

    if (!code) return ""; // fallback: no flag

    return code
      .toUpperCase()
      .split("")
      .map(char => String.fromCodePoint(127397 + char.charCodeAt(0)))
      .join("");
  }

  function generateResults() {
    console.log("Starting to generateResults")
    const country = "{{ country_name }}";
    const correct = {{ correct_count }};
    const total = {{ border_count }};
    const hardMode = {{ 'true' if hard_mode else 'false' }};
    const date = new Date().toLocaleDateString('en-GB');
    const gameNumber = {{ game_number }}

    // get the guess data
    const guessHistory = {{ guess_history | default([]) | tojson }};
    const correctGuesses = {{ correct_guesses | default([]) | tojson }};
    const wrongGuesses = {{ wrong_guesses | default([]) | tojson }};
    const flatGuessHistory = guessHistory.flat();

    let resultEmojis = [];

    // populate squares
    for (let guess of flatGuessHistory) {
      if (correctGuesses.includes(guess)) {
        resultEmojis.push("🟩");
      } else if (wrongGuesses.includes(guess)) {
        resultEmojis.push("🟥");
      }
    }

    // populate content
    const flag = countryToFlagEmoji(country) 
    const result = `Bordle 🌍 - ${date} - (#${gameNumber})
    Country: ${hardMode === 'true' ? '???' : `${country} ${flag}`}
    ${resultEmojis.join('')} (${correct}/${total})
    https://bordle.world`;
    return result;
  }

  // function to copy to clipboard
  function copyToClipboard() {
    const resultsText = generateResults(); // Assume this returns the game results string
    navigator.clipboard.writeText(resultsText).then(() => {
      alert('Results copied to clipboard!');
    }).catch(err => {
      console.error('Failed to copy: ', err);
      alert('Failed to copy results. Please try again.');
    });
  }

  // function to copy to clipboard
  function shareToWhatsapp() {
    const country = "{{ country_name }}";
    const correct = {{ correct_count }};
    const total = {{ border_count }};
    const hardMode = {{ 'true' if hard_mode else 'false' }};
    const date = new Date().toLocaleDateString('en-GB');
    const gameNumber = {{ game_number }}

    // get the guess data
    const guessHistory = {{ guess_history | default([]) | tojson }};
    const correctGuesses = {{ correct_guesses | default([]) | tojson }};
    const wrongGuesses = {{ wrong_guesses | default([]) | tojson }};
    const flatGuessHistory = guessHistory.flat();

    let resultEmojis = [];

    // populate squares
    for (let guess of flatGuessHistory) {
      if (correctGuesses.includes(guess)) {
        resultEmojis.push("🟩");
      } else if (wrongGuesses.includes(guess)) {
        resultEmojis.push("🟥");
      }
    }

    // populate content
    const flag = countryToFlagEmoji(country) 
    const result = `Bordle 🌍 - ${date} - (#${gameNumber})
    Country: ${hardMode === 'true' ? '???' : `${country} ${flag}`}
    ${resultEmojis.join('')} (${correct}/${total})
    https://bordle.world`;
    
    const encodedMessage = encodeURIComponent(result);
    console.log(encodedMessage);
    const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
    window.open(whatsappUrl, "_blank");
    console.log('Shareing to whatsapp: ', encodedMessage);
  };
</script>
