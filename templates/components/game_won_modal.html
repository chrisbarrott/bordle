<!-- components/game_won_modal.html -->
<div id="gameWonMessage" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl p-6 relative">
    <h2 class="text-2xl font-bold text-green-600 text-center mb-4">Well done!</h2>
    <p class="text-center text-lg mb-2">You correctly guessed all of <strong>{{ country_name }}</strong>'s bordering countries:</p>
    <div class="text-center text-gray-700 mb-4">
      <strong>{{ all_correct | join(", ") }}</strong>
    </div>
    <div id="victoryMap" class="w-full h-80 mb-4 bg-gray-200"></div>
    <p class="text-center text-gray-600">Come back tomorrow for a new challenge!</p>
  </div>
</div>

<script type="text/javascript">
  window.onload = function () {
    const country = {{ country_geojson | tojson }};
    const corrects = {{ correct_shapes | tojson }};
    const layers = [
      {
        "data": { "values": country },
        "mark": { "type": "geoshape", "fill": "black", "stroke": "white" }
      }
    ];

    for (let shape of corrects) {
      layers.push({
        "data": { "values": shape },
        "mark": { "type": "geoshape", "fill": "green", "stroke": "white" }
      });
    }

    const gameWonSpec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "width": "container",
      "height": 300,
      "projection": { "type": "mercator" },
      "layer": layers
    };

    vegaEmbed('#victoryMap', gameWonSpec, { actions: false }).catch(console.error);
  };
</script>
