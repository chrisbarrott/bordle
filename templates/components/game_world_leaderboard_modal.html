<div id="gameLeaderboardModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 hidden">
  <div class="bg-white p-6 rounded-lg shadow-lg relative w-96 max-h-[90vh] overflow-y-auto">
    <button onclick="toggleLeaderboard()" class="absolute top-2 right-3 text-gray-500 text-xl">&times;</button>
    <h3 class="text-lg font-bold text-blue-800 mb-2 text-center">🌍 World Leaderboard</h3>

    <ul class="text-gray-800 space-y-3">
      <li><strong>Top 5 Countries Today</strong></li>
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="border-b border-gray-300 text-gray-600">
            <th class="text-left py-1">Country</th>
            <th class="text-right py-1">Success %</th>
            <th class="text-right py-1">Guesses</th>
          </tr>
        </thead>
        <tbody id="dailyLeaderboardRows">
          <tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>
        </tbody>
      </table>

      <hr class="my-3">

      <li><strong>Top 5 Countries (All Time)</strong></li>
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="border-b border-gray-300 text-gray-600">
            <th class="text-left py-1">Country</th>
            <th class="text-right py-1">Success %</th>
            <th class="text-right py-1">Guesses</th>
          </tr>
        </thead>
        <tbody id="allTimeLeaderboardRows">
          <tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>
        </tbody>
      </table>
    </ul>
  </div>
</div>


<!-- Required for leaderboard modal -->
<script>
  function openLeaderboard() {
      document.getElementById('gameLeaderboardModal').classList.remove('hidden');
  }

  function closeLeaderboard() {
      document.getElementById('gameLeaderboardModal').classList.add('hidden');
  }
</script>
<!-- Required for leaderboard modal -->

<script>
async function toggleLeaderboard() {
    const modal = document.getElementById("gameLeaderboardModal");
    const isHidden = modal.classList.contains("hidden");

    if (isHidden) {
        console.log("[Leaderboard] Opening modal...");
        modal.classList.remove("hidden");
        await loadLeaderboardData();
    } else {
        console.log("[Leaderboard] Closing modal...");
        modal.classList.add("hidden");
    }
}

async function loadLeaderboardData() {
    console.log("[Leaderboard] Fetching data from /leaderboard_data...");
    const dailyBody = document.getElementById("dailyLeaderboardRows");
    const allTimeBody = document.getElementById("allTimeLeaderboardRows");

    dailyBody.innerHTML = `<tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>`;
    allTimeBody.innerHTML = `<tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>`;

    try {
        const response = await fetch("/leaderboard_data", { cache: "no-cache" });

        console.log("[Leaderboard] Response status:", response.status);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        console.log("[Leaderboard] Data received:", data);

        if (!data.daily || !data.all_time) {
            console.warn("[Leaderboard] Missing keys in data:", data);
            throw new Error("Invalid data format");
        }

        // Render daily stats
        dailyBody.innerHTML = data.daily.length
            ? data.daily.map(row => `
                <tr class="border-b border-gray-200">
                    <td class="py-1">${row.country || "Unknown"}</td>
                    <td class="py-1 text-right">${(row.success_rate ?? 0).toFixed(1)}%</td>
                    <td class="py-1 text-right">${row.total_guesses ?? 0}</td>
                </tr>
              `).join("")
            : `<tr><td colspan="3" class="text-center py-2 text-gray-500">No data today</td></tr>`;

        // Render all-time stats
        allTimeBody.innerHTML = data.all_time.length
            ? data.all_time.map(row => `
                <tr class="border-b border-gray-200">
                    <td class="py-1">${row.country || "Unknown"}</td>
                    <td class="py-1 text-right">${(row.success_rate ?? 0).toFixed(1)}%</td>
                    <td class="py-1 text-right">${row.total_guesses ?? 0}</td>
                </tr>
              `).join("")
            : `<tr><td colspan="3" class="text-center py-2 text-gray-500">No all-time data</td></tr>`;

    } catch (err) {
        console.error("[Leaderboard] Error loading data:", err);
        dailyBody.innerHTML = `<tr><td colspan="3" class="text-center text-red-500 py-2">Failed to load</td></tr>`;
        allTimeBody.innerHTML = `<tr><td colspan="3" class="text-center text-red-500 py-2">Failed to load</td></tr>`;
    }
}

// Optional: pre-load when page is ready
window.addEventListener("DOMContentLoaded", () => {
    console.log("[Leaderboard] Page loaded, preloading data...");
    loadLeaderboardData();
});
</script>
