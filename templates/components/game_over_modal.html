<div id="gameOverMessage" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl p-6 relative">
    <h2 class="text-2xl font-bold text-red-600 text-center mb-4">Out of guesses!</h2>
    <p class="text-center text-lg mb-2">The bordering countries of <strong>{{ country_name }}</strong> were:</p>
    <div class="text-center text-gray-700 mb-4">
      <strong>{{ all_correct | join(", ") }}</strong>
    </div>
    <div id="finalMap" class="w-full h-80 mb-4 bg-gray-200"></div>
    <p class="text-center text-gray-600">Try again tomorrow!</p>
  </div>
</div>

<script type="text/javascript">
  window.onload = function () {
    const country = {{ country_geojson | tojson }};
    const corrects = {{ correct_shapes | tojson }};
    const wrongs = {{ wrong_shapes | tojson }};

    const layers = [];

    // Main country
    layers.push({
      data: { values: country },
      mark: { type: "geoshape", fill: "black", stroke: "white" }
    });

    // Main country label
    layers.push({
      data: { values: country },
      transform: [{ calculate: "datum.properties.name", as: "label" }],
      mark: {
        type: "text",
        fontSize: 12,
        dy: -5,
        fontWeight: "bold"
      },
      encoding: {
        longitude: { field: "properties.centroid_lon", type: "quantitative" },
        latitude: { field: "properties.centroid_lat", type: "quantitative" },
        text: { field: "label", type: "nominal" },
        color: { value: "black" }
      }
    });

    // Each correct border country + label
    for (let shape of corrects) {
      layers.push({
        data: { values: shape },
        mark: { type: "geoshape", fill: "green", stroke: "white" }
      });

      layers.push({
        data: { values: shape },
        transform: [{ calculate: "datum.properties.name", as: "label" }],
        mark: {
          type: "text",
          fontSize: 12,
          background: "white", 
          dy: -5,
          fontWeight: "bold",
          padding: 2
        },
        encoding: {
          longitude: { field: "properties.centroid_lon", type: "quantitative" },
          latitude: { field: "properties.centroid_lat", type: "quantitative" },
          text: { field: "label", type: "nominal" },
          color: { value: "black" }
        }
      });
    }

    
    // Each correct border country + label
    for (let shape of wrongs) {
      layers.push({
        data: { values: shape },
        mark: { type: "geoshape", fill: "red", stroke: "white" }
      });

      layers.push({
        data: { values: shape },
        transform: [{ calculate: "datum.properties.name", as: "label" }],
        mark: {
          type: "text",
          fontSize: 12,
          background: "white", 
          dy: -5,
          fontWeight: "bold",
          padding: 2
        },
        encoding: {
          longitude: { field: "properties.centroid_lon", type: "quantitative" },
          latitude: { field: "properties.centroid_lat", type: "quantitative" },
          text: { field: "label", type: "nominal" },
          color: { value: "black" }
        }
      });
    }

    const gameOverSpec = {
      $schema: "https://vega.github.io/schema/vega-lite/v5.json",
      width: "container",
      height: 300,
      projection: { type: "mercator" },
      layer: layers
    };

    vegaEmbed('#victoryMap', gameOverSpec, { actions: false }).catch(console.error);
  };
</script>
