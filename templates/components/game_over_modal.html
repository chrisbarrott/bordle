<div id="gameFailedMessage" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-2xl p-4 sm:p-6 relative overflow-y-auto max-h-[90vh]">

    <!-- 🎉 Title & Stats Row -->
    <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-3">
      <h2 class="text-xl sm:text-2xl font-bold text-red-600 text-center sm:text-left">
        ❌ You Lost!
      </h2>

      <!-- 📊 Compact Stats Table -->
      <div id="statsContainer"
        class="border border-gray-300 rounded-lg px-3 py-2 bg-gray-50 shadow text-xs sm:text-sm w-full sm:w-auto">
        <div class="grid grid-cols-4 divide-x divide-gray-300 text-gray-800 font-semibold text-center">
          <div class="px-1">
            <span class="block text-blue-700">Played</span>
            <span id="gamesPlayed">0</span>
          </div>
          <div class="px-1">
            <span class="block text-blue-700">Wins</span>
            <span id="gamesWon">0</span>
          </div>
          <div class="px-1">
            <span class="block text-blue-700">Rate%</span>
            <span id="successRate">0%</span>
          </div>
          <div class="px-1">
            <span class="block text-blue-700">Streak</span>
            <span id="currentStreak">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ✅ Correct Countries -->
    <p class="text-center text-sm sm:text-base mb-2">
      The correct bordering countries of <strong>{{ country_name }}</strong> were:
    </p>
    <div class="text-center text-gray-700 mb-3 text-sm sm:text-base">
      <strong>{{ all_correct | join(", ") }}</strong>
    </div>

    <!-- 🗺️ Failure Map -->
    <div id="failureMap" class="w-full h-80 mb-4 bg-gray-200 rounded"></div>

    <p class="text-center text-gray-600">Try again tomorrow for a new challenge!</p>

    <!-- 📤 Buttons -->
    <div class="flex flex-wrap justify-center gap-3 w-full mt-2">
      <button onclick="window.location.href='/stats'"
        class="inline-flex items-center justify-center bg-blue-500 text-white px-3 py-2 rounded hover:bg-blue-600 text-sm sm:text-base">
        🌍 View World Stats
      </button>

      <button id="whatsappShare" onclick="shareToWhatsapp()" type="button"
        class="inline-flex items-center justify-center bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600 text-sm sm:text-base">
        <img src="/static/images/whatsapp_icon.png" alt="Share on WhatsApp" class="h-4 w-4 mr-2">
        Share
      </button>

      <button onclick="copyToClipboard()" type="button"
        class="inline-flex items-center justify-center bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700 text-sm sm:text-base">
        📋 Copy
      </button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="text/javascript">
  window.onload = function () {
    // Update local stats display
    const stats = JSON.parse(localStorage.getItem("bordleStats"));
    if (stats) updateUserStats(stats);

    // Map rendering
    const map = L.map('failureMap');
    L.tileLayer('https://api.maptiler.com/maps/basic-v2/256/{z}/{x}/{y}.png?key=shOVlsPI8fhJlEek08rF', {
      attribution: '&copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a> contributors',
      tileSize: 256,
      zoomOffset: 0,
      zoom: 1.5
    }).addTo(map);

    const mainCountry = {{ country_geojson | tojson }};
    const correctShapes = {{ correct_shapes | tojson }};
    const wrongShapes = {{ wrong_shapes | tojson }};

    const mainStyle = { color: "black", weight: 2, fillOpacity: 0.7 };
    const correctStyle = { color: "green", weight: 1, fillOpacity: 0.5 };
    const wrongStyle = { color: "red", weight: 1, fillOpacity: 0.5 };

    const mainLayer = L.geoJSON(mainCountry, { style: mainStyle }).addTo(map);
    map.fitBounds(mainLayer.getBounds());
    map.setZoom(map.getZoom() - 1);

    correctShapes.forEach(shape => L.geoJSON(shape, { style: correctStyle }).addTo(map));
    wrongShapes.forEach(shape => L.geoJSON(shape, { style: wrongStyle }).addTo(map));
  };

  function updateUserStats(stats) {
    const successRate = stats.gamesPlayed > 0
      ? ((stats.gamesWon / stats.gamesPlayed) * 100).toFixed(2)
      : 0;
    const mapping = {
      gamesPlayed: stats.gamesPlayed,
      gamesWon: stats.gamesWon,
      currentStreak: stats.currentStreak,
      successRate: `${successRate}%`
    };
    for (const [id, value] of Object.entries(mapping)) {
      document.querySelectorAll(`#${id}`).forEach(el => el.innerText = value);
    }
  }
</script>

<script>
  // Function to get the flag
  function countryToFlagEmoji(country) {
    const isoUrl = "{{ url_for('static', filename='map_data/iso_country_codes.json') }}";
    const isoMap = {{ iso_map | tojson }};
    const code = isoMap[country.trim()];

    if (!code) return ""; // fallback: no flag

    return code
      .toUpperCase()
      .split("")
      .map(char => String.fromCodePoint(127397 + char.charCodeAt(0)))
      .join("");
  }

  function generateResults() {
    console.log("Starting to generateResults")
    const country = "{{ country_name }}";
    const correct = {{ correct_count }};
    const total = {{ border_count }};
    const hardMode = {{ 'true' if hard_mode else 'false' }};
    const date = new Date().toLocaleDateString('en-GB');
    const gameNumber = {{ game_number }}

    // get the guess data
    const guessHistory = {{ guess_history | default([]) | tojson }};
    const correctGuesses = {{ correct_guesses | default([]) | tojson }};
    const wrongGuesses = {{ wrong_guesses | default([]) | tojson }};
    const flatGuessHistory = guessHistory.flat();

    let resultEmojis = [];

    // populate squares
    for (let guess of flatGuessHistory) {
      if (correctGuesses.includes(guess)) {
        resultEmojis.push("🟩");
      } else if (wrongGuesses.includes(guess)) {
        resultEmojis.push("🟥");
      }
    }

    // populate content
    const flag = countryToFlagEmoji(country) 
    const result = `Bordle 🌍 - ${date} - (#${gameNumber})
    Country: ${hardMode === 'true' ? '???' : `${country} ${flag}`}
    ${resultEmojis.join('')} (${correct}/${total})
    https://bordle.world`;
    return result;
  }

  // function to copy to clipboard
  function copyToClipboard() {
    const resultsText = generateResults(); // Assume this returns the game results string
    navigator.clipboard.writeText(resultsText).then(() => {
      alert('Results copied to clipboard!');
    }).catch(err => {
      console.error('Failed to copy: ', err);
      alert('Failed to copy results. Please try again.');
    });
  }

    const flatGuessHistory = guessHistory.flat();

    let resultEmojis = [];

    // populate squares

      } else if (wrongGuesses.includes(guess)) {

    }

    // populate content
    const flag = countryToFlagEmoji(country) 
    const result = `Bordle 🌍 - ${date} - (#${gameNumber})
