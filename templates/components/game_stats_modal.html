<div id="gameStatsModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 hidden">
  <div class="bg-white p-6 rounded-lg shadow-lg relative w-96">
    <button onclick="toggleStats()" class="absolute top-2 right-3 text-gray-500 text-xl">&times;</button>
    <h3 class="text-lg font-bold text-blue-800 mb-2">📊 Your Stats</h3>
    <ul class="text-gray-800 space-y-2">
      <li><strong>Games Played:</strong> <span id="gamesPlayed">0</span></li>
      <li><strong>Games Won:</strong> <span id="gamesWon">0</span></li>
      <li><strong>Win %:</strong> <span id="successRate">0.00</span>%</li>
      <li><strong>Current Streak:</strong> <span id="currentStreak">0</span></li>
    </ul>
    <br>
    <h3 class="text-lg font-bold text-blue-800 mb-2">📊 Bordle Stats (All Players)</h3>
    <ul class="text-gray-800 space-y-2">
      <li><strong>Games played today:</strong> <span id="games_today">0</span></li>
      <li><strong>Total games ever:</strong> <span id="total_games">0</span></li>
      <li><strong>Success rate today:</strong> <span id="success_rate">0.00</span>%</li>
    </ul>
  </div>
</div>

<script>
  // function to update stats 
  function updateLocalStats(win) {
    console.log("Starting update of stats")
    let stats = JSON.parse(localStorage.getItem("bordleStats")) || {
      gamesPlayed: 0,
      gamesWon: 0,
      currentStreak: 0,
    };

    stats.gamesPlayed += 1;

    if (win) {
      stats.gamesWon += 1;
      stats.currentStreak += 1;
    } else {
      stats.currentStreak = 0;
    }

    console.log("Setting stats:", stats)
    localStorage.setItem("bordleStats", JSON.stringify(stats));
    localStorage.setItem(statsKey, "true");
  }

  // Load user stats from localStorage and display them
  function showLocalStats() {
    const stats = JSON.parse(localStorage.getItem("bordleStats"));
    console.log("Showing stats:", stats)
    if (!stats) return;

    const successRate = stats.gamesPlayed > 0
      ? Math.round((stats.gamesWon / stats.gamesPlayed) * 100)
      : 0;

    document.getElementById("gamesPlayed").innerText = stats.gamesPlayed;
    document.getElementById("gamesWon").innerText = stats.gamesWon;
    document.getElementById("currentStreak").innerText = stats.currentStreak;
    document.getElementById("successRate").innerText = `${successRate}%`;
  }

  // // Initialize stats display when DOM is ready
  window.addEventListener('DOMContentLoaded', () => {
    // listener for displaying stats
    showLocalStats();

    const gameOver = "{{ game_over }}";  // `true` or `false`
    console.log("Game over?", gameOver);

    if(gameOver == "True"){
      // listener for updating the game stats
      const gameResult = "{{ game_result }}";
      const gameNumber = {{ game_number }};
      const statsKey = `bordleStatsUpdated_${gameNumber}`;

      console.log("Game number:", gameNumber, "Game over:", gameOver, "gameResult", gameResult);

      // determine if to update stats
      if(gameResult === "Win" || gameResult === "Loss"){
        updateLocalStats(gameResult);  // Update result
        localStorage.setItem(statsKey, "true");
      }
    }
  });
</script>
