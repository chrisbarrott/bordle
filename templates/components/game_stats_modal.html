<div id="gameStatsModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 hidden">
  <div class="bg-white p-6 rounded-lg shadow-lg relative w-96">
    <button onclick="toggleStats()" class="absolute top-2 right-3 text-gray-500 text-xl">&times;</button>
    <h3 class="text-lg font-bold text-blue-800 mb-2">📊 Your Stats</h3>
    <ul class="text-gray-800 space-y-2">
      <li><strong>Games Played:</strong> <span id="bordle_games_played">0</span></li>
      <li><strong>Games Won:</strong> <span id="bordle_wins">0</span></li>
      <li><strong>Win %:</strong> <span id="bordle_success_rate">0.00</span>%</li>
      <li><strong>Current Streak:</strong> <span id="bordle_current_streak">0</span></li>
    </ul>

    <br>

    <h3 class="text-lg font-bold text-blue-800 mb-2">📊 Bordle Stats (All Players)</h3>
    <ul class="text-gray-800 space-y-2">
      <li><strong>Games played today:</strong> <span id="games_today">0</span></li>
      <li><strong>Total games ever:</strong> <span id="total_games">0</span></li>
      <li><strong>Success rate today:</strong> <span id="success_rate">0.00</span>%</li>
    </ul>
  </div>
</div>

<script>
  // Load user stats from localStorage and display them
  function displayUserStats() {
    const gamesPlayed = parseInt(localStorage.getItem('bordle_games_played')) || 0;
    const wins = parseInt(localStorage.getItem('bordle_wins')) || 0;
    const streak = parseInt(localStorage.getItem('bordle_current_streak')) || 0;
    const successRate = gamesPlayed > 0 ? ((wins / gamesPlayed) * 100).toFixed(2) : '0.00';

    document.getElementById('bordle_games_played').textContent = gamesPlayed;
    document.getElementById('bordle_wins').textContent = wins;
    document.getElementById('bordle_success_rate').textContent = successRate;
    document.getElementById('bordle_current_streak').textContent = streak;
  }

  // Fetch global bordle stats from your backend API and display them
  async function fetchGlobalStats() {
    try {
      const response = await fetch('/api/stats');
      if (!response.ok) throw new Error('Network error');
      const stats = await response.json();

      document.getElementById('games_today').textContent = stats.games_today;
      document.getElementById('total_games').textContent = stats.total_games;
      document.getElementById('success_rate').textContent = stats.success_rate.toFixed(2);
    } catch (error) {
      console.error('Error fetching global stats:', error);
    }
  }

  // Initialize stats display when DOM is ready
  window.addEventListener('DOMContentLoaded', () => {
    displayUserStats();
    fetchGlobalStats();
  });

  // Optionally refresh global stats every minute
  setInterval(fetchGlobalStats, 60000);

  // Example toggle function to show/hide stats modal
  function toggleStats() {
    const modal = document.getElementById('gameStatsModal');
    modal.classList.toggle('hidden');
  }
</script>
