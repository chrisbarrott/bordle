{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto mt-8 p-6 bg-white shadow-lg rounded-2xl">
  <h1 class="text-3xl font-bold mb-4 text-center">Game Statistics</h1>

  <!-- Navigation -->
  <div class="text-center mb-6">
    <a href="/" class="text-blue-600 hover:underline font-semibold">&larr; Back to Today's Game</a>
  </div>

  <!-- World Stats -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-2">🌍 World Stats (Today)</h2>
    <table class="w-full text-sm border-collapse border-t border-gray-300">
      <thead class="text-gray-600 border-b border-gray-300">
        <tr>
          <th class="text-left py-1">Country</th>
          <th class="text-right py-1">Success %</th>
          <th class="text-right py-1">Plays</th>
        </tr>
      </thead>
      <tbody id="dailyLeaderboardRows">
        <tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <!-- User Stats -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-2">🧑‍💻 Your Stats</h2>
    <div id="userStats" class="text-gray-700 text-sm">Loading...</div>
  </section>

  <!-- All-Time Leaderboard -->
  <section>
    <h2 class="text-xl font-semibold mb-2">🏆 All-Time Leaderboard</h2>
    <table class="w-full text-sm border-collapse border-t border-gray-300">
      <thead class="text-gray-600 border-b border-gray-300">
        <tr>
          <th class="text-left py-1">Country</th>
          <th class="text-right py-1">Success %</th>
          <th class="text-right py-1">Plays</th>
        </tr>
      </thead>
      <tbody id="allTimeLeaderboardRows">
        <tr><td colspan="3" class="text-center py-2 text-gray-500">Loading...</td></tr>
      </tbody>
    </table>
  </section>
</div>

<script src="{{ url_for('static', filename='js/stats_page.js') }}"></script>
{% endblock %}
