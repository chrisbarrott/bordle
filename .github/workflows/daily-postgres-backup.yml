name: Daily Postgres Backup

on:
  schedule:
    - cron: "15 3 * * *" # Daily at 03:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
      BACKUP_DIR: backups
      BACKUP_PREFIX: bordle-postgres
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_GIT_BRANCH: ${{ vars.BACKUP_GIT_BRANCH || 'backup-dumps' }}
      BACKUP_GIT_RETENTION_COUNT: ${{ vars.BACKUP_GIT_RETENTION_COUNT || '7' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install PostgreSQL client 18
        run: |
          # Remove any pre-installed pg client that ships with the runner
          sudo apt-get remove -y --purge 'postgresql-client*' || true
          # Add the official PGDG apt repo
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -o /tmp/pgdg.asc --proto '=https' --tlsv1.2 -sSf https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo cp /tmp/pgdg.asc /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null \
            <<<"deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main"
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          # Put pg18 bin first in PATH for subsequent steps
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Create backup dump
        id: backup
        env:
          PG_DUMP: /usr/lib/postgresql/18/bin/pg_dump
        run: bash scripts/create_postgres_backup.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: |
            ${{ steps.backup.outputs.backup_file }}
            ${{ steps.backup.outputs.backup_file }}.sha256
          retention-days: 7

      - name: Push backup to git backup branch
        env:
          BACKUP_FILE: ${{ steps.backup.outputs.backup_file }}
          BACKUP_FILENAME: ${{ steps.backup.outputs.backup_filename }}
        run: |
          set -euo pipefail

          BRANCH="${BACKUP_GIT_BRANCH}"
          KEEP_COUNT="${BACKUP_GIT_RETENTION_COUNT}"
          TARGET_DIR="postgres"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout --orphan "${BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "${TARGET_DIR}"
          cp "${BACKUP_FILE}" "${TARGET_DIR}/${BACKUP_FILENAME}"
          if [ -f "${BACKUP_FILE}.sha256" ]; then
            cp "${BACKUP_FILE}.sha256" "${TARGET_DIR}/${BACKUP_FILENAME}.sha256"
          fi

          if [[ "${KEEP_COUNT}" =~ ^[0-9]+$ ]] && [[ "${KEEP_COUNT}" -gt 0 ]]; then
            ls -1t "${TARGET_DIR}"/*.dump 2>/dev/null | tail -n +$((KEEP_COUNT + 1)) | xargs -r rm -f
            ls -1t "${TARGET_DIR}"/*.dump.sha256 2>/dev/null | tail -n +$((KEEP_COUNT + 1)) | xargs -r rm -f
          fi

          git add "${TARGET_DIR}"
          if git diff --cached --quiet; then
            echo "No backup changes to commit"
          else
            git commit -m "backup: ${BACKUP_FILENAME}"
            git push origin "${BRANCH}"
          fi

